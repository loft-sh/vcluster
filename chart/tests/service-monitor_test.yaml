suite: ServiceMonitor
templates:
  - service-monitor.yaml

tests:
  - it: should not create service monitor by default
    asserts:
      - hasDocuments:
          count: 0

  - it: check defaults
    release:
      name: my-release
      namespace: my-namespace
    set:
      controlPlane:
        serviceMonitor:
          enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.name
          value: vc-my-release
      - equal:
          path: metadata.namespace
          value: my-namespace
      - equal:
          path: spec.selector.matchLabels.app
          value: vcluster
      - lengthEqual:
          path: spec.endpoints
          count: 3
      - equal:
          path: spec.endpoints[1].path
          value: /metrics/controller-manager
      - equal:
          path: spec.endpoints[2].path
          value: /metrics/kine
      - equal:
          path: spec.endpoints[2].relabelings[0].replacement
          value: kine

  - it: check metricRelabelings not rendered by default
    release:
      name: my-release
      namespace: my-namespace
    set:
      controlPlane:
        serviceMonitor:
          enabled: true
    asserts:
      - notExists:
          path: spec.endpoints[0].metricRelabelings
      - notExists:
          path: spec.endpoints[1].metricRelabelings
      - notExists:
          path: spec.endpoints[2].metricRelabelings

  - it: check metricRelabelings rendered on every endpoint
    release:
      name: my-release
      namespace: my-namespace
    set:
      controlPlane:
        distro:
          k8s:
            enabled: true
            scheduler:
              enabled: true
        backingStore:
          etcd:
            embedded:
              enabled: true
        serviceMonitor:
          enabled: true
          metricRelabelings:
            - action: drop
              sourceLabels: ["__name__"]
              regex: apiserver_request_duration_seconds_bucket
    asserts:
      - hasDocuments:
          count: 1
      - lengthEqual:
          path: spec.endpoints
          count: 4
      - equal:
          path: spec.endpoints[0].metricRelabelings[0].action
          value: drop
      - equal:
          path: spec.endpoints[1].metricRelabelings[0].action
          value: drop
      - equal:
          path: spec.endpoints[2].metricRelabelings[0].action
          value: drop
      - equal:
          path: spec.endpoints[3].metricRelabelings[0].action
          value: drop
      - equal:
          path: spec.endpoints[0].metricRelabelings[0].regex
          value: apiserver_request_duration_seconds_bucket

  - it: check metricRelabelings rendered on kine endpoint
    release:
      name: my-release
      namespace: my-namespace
    set:
      controlPlane:
        serviceMonitor:
          enabled: true
          metricRelabelings:
            - action: drop
              sourceLabels: ["__name__"]
              regex: apiserver_request_duration_seconds_bucket
    asserts:
      - equal:
          path: spec.endpoints[2].path
          value: /metrics/kine
      - equal:
          path: spec.endpoints[2].metricRelabelings[0].action
          value: drop

  - it: override release label
    release:
      name: my-release
      namespace: my-namespace
    set:
      controlPlane:
        serviceMonitor:
          enabled: true
          labels:
            release: kube-prometheus-stack
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: metadata.labels.release
          value: kube-prometheus-stack

  - it: check virtual scheduler
    release:
      name: my-release
      namespace: my-namespace
    set:
      controlPlane:
        distro:
          k8s:
            enabled: true
            scheduler:
              enabled: true
        serviceMonitor:
          enabled: true
    asserts:
    - hasDocuments:
        count: 1
    - lengthEqual:
        path: spec.endpoints
        count: 4
    - equal:
        path: spec.endpoints[2].path
        value: /metrics/scheduler
    - equal:
        path: spec.endpoints[3].path
        value: /metrics/kine

  - it: check virtual scheduler (deprecated)
    release:
      name: my-release
      namespace: my-namespace
    set:
      controlPlane:
        advanced:
          virtualScheduler:
            enabled: true
        serviceMonitor:
          enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - lengthEqual:
          path: spec.endpoints
          count: 4
      - equal:
          path: spec.endpoints[2].path
          value: /metrics/scheduler
      - equal:
          path: spec.endpoints[3].path
          value: /metrics/kine

  - it: check embedded etcd
    release:
      name: my-release
      namespace: my-namespace
    set:
      controlPlane:
        backingStore:
          etcd:
            embedded:
              enabled: true
        serviceMonitor:
          enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - lengthEqual:
          path: spec.endpoints
          count: 3
      - equal:
          path: spec.endpoints[2].path
          value: /metrics/etcd
      - notContains:
          path: spec.endpoints
          content:
            path: /metrics/kine

  - it: check external database renders kine endpoint
    release:
      name: my-release
      namespace: my-namespace
    set:
      controlPlane:
        backingStore:
          database:
            external:
              enabled: true
        serviceMonitor:
          enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - lengthEqual:
          path: spec.endpoints
          count: 3
      - equal:
          path: spec.endpoints[2].path
          value: /metrics/kine

  - it: check deployed etcd omits kine endpoint
    release:
      name: my-release
      namespace: my-namespace
    set:
      controlPlane:
        backingStore:
          etcd:
            deploy:
              enabled: true
        serviceMonitor:
          enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - lengthEqual:
          path: spec.endpoints
          count: 2
      - notContains:
          path: spec.endpoints
          content:
            path: /metrics/kine

  - it: check external etcd omits kine endpoint
    release:
      name: my-release
      namespace: my-namespace
    set:
      controlPlane:
        backingStore:
          etcd:
            external:
              enabled: true
        serviceMonitor:
          enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - lengthEqual:
          path: spec.endpoints
          count: 2
      - notContains:
          path: spec.endpoints
          content:
            path: /metrics/kine
