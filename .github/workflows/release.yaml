name: Release

# Builder for the vCluster release pipeline (DEVOPS-1050). The GitHub Release is
# a pipeline OUTPUT, not a trigger: goreleaser creates it at the end of a green
# build. This workflow is dispatched by the loft-sh/github-actions
# vcluster-release action via `gh workflow run release.yaml --ref <tag>`, so
# github.ref is refs/tags/<version> and github.ref_name is the version. It no
# longer triggers on release:created, so a monorepo-created OSS release can never
# re-trigger this builder.
on:
  workflow_dispatch:

jobs:
  check_minimum_version_tag:
    if: github.repository_owner == 'loft-sh'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        if: ${{ !contains(github.ref_name, '-') }}
        with:
          ref: ${{ github.ref_name }}
      - name: Validate MinimumVersionTag is stable
        if: ${{ !contains(github.ref_name, '-') }}
        run: |
          MINIMUM_VERSION_TAG=$(grep -oP 'MinimumVersionTag\s*=\s*"\Kv[^"]+' pkg/platform/version.go)
          if [[ ! "$MINIMUM_VERSION_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Error: MinimumVersionTag ('$MINIMUM_VERSION_TAG') must be a stable release version (e.g. v4.7.0), not a pre-release"
            exit 1
          fi
          echo "MinimumVersionTag=$MINIMUM_VERSION_TAG is a stable version"

  publish:
    if: startsWith(github.ref, 'refs/tags/v') == true
    needs: [check_minimum_version_tag]
    name: Publish vcluster
    runs-on: large-8_32

    outputs:
      release_version: ${{ steps.get_version.outputs.release_version }}
      previous_tag: ${{ steps.get_version.outputs.previous_tag }}
      semver_parsed: ${{ steps.semver.outputs.parsed_version }}

    permissions:
      id-token: write # This is the key for OIDC cosign!
      packages: write
      contents: write

    steps:
      - name: Remove default packages
        run: |
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune --all --force || true
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          cache: false
          go-version-file: go.mod
      - name: Setup Just
        uses: extractions/setup-just@v2
      - name: Setup Cosgin
        uses: sigstore/cosign-installer@main
        with:
          cosign-release: "v2.2.3"
      - name: Setup Syft
        uses: anchore/sbom-action/download-syft@v0.22.2
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - uses: azure/setup-helm@v4
        with:
          version: "v3.0.2"
      - id: get_version
        run: |
          RELEASE_VERSION=$(echo "$GITHUB_REF" | sed -nE 's!refs/tags/!!p')
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"
          # Branch-local previous tag: the tag reachable from this commit's
          # parent on THIS branch, not the global latest tag (which would be
          # wrong on a release branch). See DEVOPS-1050.
          echo "previous_tag=$(git describe --tags --abbrev=0 --match 'v*' "${GITHUB_SHA}^" 2>/dev/null || true)" >> "$GITHUB_OUTPUT"
      - name: Validate semver
        id: semver
        uses: loft-sh/github-actions/.github/actions/semver-validation@semver-validation/v1
        with:
          version: ${{ steps.get_version.outputs.release_version }}
      - name: Check if release would downgrade homebrew tap
        id: check_latest_stable
        run: |
          CURRENT_TAG="${{ steps.get_version.outputs.release_version }}"
          # Only check stable releases. Pre-releases are handled by
          # goreleaser's skip_upload: auto in .goreleaser.yaml.
          if [[ "$CURRENT_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            # Fetch the current version from the homebrew tap formula with
            # retry + exponential backoff. If we can't verify the tap version
            # we must fail — otherwise an older release could silently overwrite
            # the latest version in the tap.
            TAP_VERSION=""
            for attempt in 1 2 3; do
              TAP_VERSION=$(curl -sfL --max-time 10 \
                "https://raw.githubusercontent.com/loft-sh/homebrew-tap/main/Formula/vcluster.rb" \
                | grep -oP 'version "\K[^"]+') && break
              TAP_VERSION=""
              delay=$((1 << attempt))  # 2, 4, 8 seconds
              echo "::warning::Attempt $attempt/3 to fetch tap version failed, retrying in ${delay}s..."
              sleep "$delay"
            done

            if [ -z "$TAP_VERSION" ]; then
              echo "::error::Failed to fetch homebrew tap version after 3 attempts. Failing to prevent potential tap downgrade."
              exit 1
            fi

            CURRENT_VERSION="${CURRENT_TAG#v}"
            if [ "$(printf '%s\n' "$CURRENT_VERSION" "$TAP_VERSION" | sort -V | tail -1)" != "$CURRENT_VERSION" ]; then
              echo "skip_homebrew=true" >> "$GITHUB_OUTPUT"
              echo "::notice::Skipping Homebrew upload: $CURRENT_TAG would downgrade tap from v$TAP_VERSION"
            else
              echo "skip_homebrew=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip_homebrew=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: "goreleaser/goreleaser-action@v6"
        with:
          args: release --clean --timeout 60m ${{ steps.check_latest_stable.outputs.skip_homebrew == 'true' && '--skip=homebrew' || '' }}
          version: "~> v2"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
          TELEMETRY_PRIVATE_KEY: ${{ secrets.VCLUSTER_TELEMETRY_PRIVATE_KEY }}
          GORELEASER_CURRENT_TAG: ${{ steps.get_version.outputs.release_version }}
          GORELEASER_PREVIOUS_TAG: ${{ steps.get_version.outputs.previous_tag }}
      - name: Save release assets
        uses: actions/upload-artifact@v6
        with:
          name: release-assets
          path: release/
      - name: Attach assets to release
        uses: FabianKramm/release-asset-action@v1
        with:
          pattern: "release/*"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      # Best-effort dispatch: a failed notify must not block the release. The
      # receiver in vcluster-docs reconciles on the next release if missed.
      - name: Notify vcluster-docs of vcluster release (config schema)
        continue-on-error: true
        uses: loft-sh/github-actions/.github/actions/repository-dispatch@repository-dispatch/v1
        with:
          target-repo: loft-sh/vcluster-docs
          event-type: vcluster-released
          payload: '{"version":"${{ steps.get_version.outputs.release_version }}","source_repo":"loft-sh/vcluster","sha":"${{ github.sha }}"}'
        env:
          GH_TOKEN: ${{ secrets.VCLUSTERLABS_DISPATCH_TOKEN }}

      - name: Notify vcluster-docs of vcluster CLI release
        continue-on-error: true
        uses: loft-sh/github-actions/.github/actions/repository-dispatch@repository-dispatch/v1
        with:
          target-repo: loft-sh/vcluster-docs
          event-type: vcluster-cli-released
          payload: '{"version":"${{ steps.get_version.outputs.release_version }}","source_repo":"loft-sh/vcluster","sha":"${{ github.sha }}"}'
        env:
          GH_TOKEN: ${{ secrets.VCLUSTERLABS_DISPATCH_TOKEN }}

  publish-chart:
    if: startsWith(github.ref, 'refs/tags/v') == true
    needs: [publish]
    uses: ./.github/workflows/publish-chart.yaml
    with:
      release_version: ${{ needs.publish.outputs.release_version }}
      ref: ${{ github.ref }}
    secrets: inherit

  # The workflow will only trigger on non-draft releases
  # https://docs.github.com/en/actions/writing-workflows/choosing-when-your-workflow-runs/events-that-trigger-workflows#release
  sync_linear:
    if: ${{ !contains(needs.publish.outputs.semver_parsed, '-next') }}
    needs:
      - publish
      - publish-chart
    name: Sync Linear Issues
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Sync Linear issues to Released
        uses: loft-sh/github-actions/.github/actions/linear-release-sync@e5084ddb2df90eab681462408d9b138356db9de4 # linear-release-sync (#156)
        with:
          release-tag: ${{ needs.publish.outputs.release_version }}
          repo-name: vcluster
          github-token: ${{ secrets.GH_ACCESS_TOKEN }}
          linear-token: ${{ secrets.LINEAR_TOKEN }}
