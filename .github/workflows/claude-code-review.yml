name: Claude Code Review

on:
  pull_request_target:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-review:
    if: github.repository_owner == 'loft-sh'
    uses: loft-sh/github-actions/.github/workflows/claude-code-review.yaml@4207288daf055fa396f57e248dd3c5657c32c65b # claude-code-review/v1
    secrets:
      anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
