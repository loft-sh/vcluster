name: Lint

on:
  pull_request:
    branches:
      - main
      - v*
    paths:
      - go.mod
      - go.sum
      - "**.go"
      - ".github/workflows/lint.yaml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    env:
      # Use vendored dependencies so fork PRs (which lack access to
      # GH_ACCESS_TOKEN) can still compile against private modules.
      GOFLAGS: -mod=vendor
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Check for prohibited vcluster import in config dir
        run: |
          #!/bin/bash
          set -e

          IMPORT="github.com/loft-sh/vcluster"
          PATTERN="\"$IMPORT(\"|/)"
          FOUND_FILES=$(find ./config -name "*.go" -not -path "./config/legacyconfig/*" | xargs grep -l -E "$PATTERN" 2>/dev/null || true)

          if [ -n "$FOUND_FILES" ]; then
            echo "❌ ERROR: Prohibited import prefix '$IMPORT' found in:"
            echo "$FOUND_FILES"
            exit 1
          fi

      - uses: actions/setup-go@v6
        with:
          go-version-file: ./go.mod
          cache: false

