name: Check Homebrew Tap Version Drift

on:
  schedule:
    - cron: "0 8 * * *" # daily at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-drift:
    name: Compare tap version vs latest release
    if: github.repository_owner == 'loft-sh'
    runs-on: ubuntu-latest

    steps:
      - name: Check brew tap drift
        uses: loft-sh/github-actions/.github/actions/check-brew-tap-drift@check-brew-tap-drift/v1
        with:
          repo: loft-sh/vcluster
          formulas: vcluster,vcluster-experimental
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL_ENG_RELEASES }}
