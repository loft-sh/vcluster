controlPlane:
  statefulSet:
    image:
      registry: ""
      repository: {{ .Repository }}
      tag: {{ .Tag }}
sync:
  fromHost:
    gatewayClasses:
      enabled: true
      selector:
        matchLabels:
          e2e.vcluster.loft.sh/gatewayclass: gatewayapi-selective
  toHost:
    services:
      enabled: true
    gatewayApi:
      gateways:
        enabled: true
      httpRoutes:
        enabled: false
      referenceGrants:
        enabled: "false"
