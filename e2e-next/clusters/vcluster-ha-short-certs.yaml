controlPlane:
  statefulSet:
    image:
      registry: ""
      repository: {{.Repository}}
      tag: {{.Tag}}
    highAvailability:
      replicas: 2
      leaseDuration: 15
      renewDeadline: 10
      retryPeriod: 5
    env:
      - name: DEVELOPMENT
        value: "true"
      - name: VCLUSTER_CERTS_VALIDITYPERIOD
        value: "3m"
      - name: VCLUSTER_CERT_CHECK_INTERVAL
        value: "15s"

  backingStore:
    etcd:
      deploy:
        enabled: true

sync:
  toHost:
    pods:
      useSecretsForSATokens: true
  fromHost:
    nodes:
      enabled: true
      selector:
        labels:
          kubernetes.io/hostname: "{{.HostClusterName}}-control-plane"
    storageClasses:
      enabled: true

policies:
  networkPolicy:
    enabled: false
