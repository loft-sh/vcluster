controlPlane:
  statefulSet:
    image:
      registry: ""
      repository: {{ .Repository }}
      tag: {{ .Tag }}
  advanced:
    workloadServiceAccount:
      imagePullSecrets:
        - name: e2e-test-registry-secret
      imagePullSecretSelector:
        matchLabels:
          inject-pull-secrets: "true"
sync:
  toHost:
    serviceAccounts:
      enabled: true
