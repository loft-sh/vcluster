controlPlane:
  statefulSet:
    image:
      registry: ""
      repository: {{.Repository}}
      tag: {{.Tag}}
    highAvailability:
      replicas: 3
      leaseDuration: 15
      renewDeadline: 10
      retryPeriod: 5

  backingStore:
    etcd:
      deploy:
        enabled: true
        statefulSet:
          highAvailability:
            replicas: 3

  coredns:
    deployment:
      replicas: 3

sync:
  toHost:
    pods:
      useSecretsForSATokens: true
    networkPolicies:
      enabled: true
    persistentVolumeClaims:
      enabled: true
    persistentVolumes:
      enabled: true
  fromHost:
    nodes:
      enabled: true
      selector:
        labels:
          kubernetes.io/hostname: "{{.HostClusterName}}-control-plane"
    runtimeClasses:
      enabled: true
    storageClasses:
      enabled: true

# Disable network policies due to known issue with kindnet + multiple coredns replicas
policies:
  networkPolicy:
    enabled: false
