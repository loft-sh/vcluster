controlPlane:
  statefulSet:
    image:
      registry: ""
      repository: {{ .Repository }}
      tag: {{ .Tag }}
networking:
  replicateServices:
    toHost:
      - from: tohost-svc/svc-test
        to: svc-test
      - from: tohost-nginx/nginx
        to: nginx-tohost
    fromHost:
      - from: fromhost-svc/svc-test
        to: default/svc-test
      - from: fromhost-nginx/nginx
        to: default/nginx-fromhost
experimental:
  deploy:
    vcluster:
      manifests: |-
        apiVersion: v1
        kind: Service
        metadata:
          name: test-replicated-service-cleanup
          namespace: default
          labels:
            vcluster.loft.sh/controlled-by: vcluster
        spec:
          selector:
            app: fake-app
          ports:
            - protocol: TCP
              port: 8080
              targetPort: 8080
              name: tcp
