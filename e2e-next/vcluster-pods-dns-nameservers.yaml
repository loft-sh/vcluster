controlPlane:
  statefulSet:
    image:
      registry: ""
      repository: {{ .Repository }}
      tag: {{ .Tag }}
sync:
  toHost:
    pods:
      enabled: true
      dns:
        nameservers:
          - service:
              scope: control-plane-host
              namespace: vcluster-dns-test
              labelSelector:
                matchLabels:
                  vcluster.com/dns-ns: primary
          - service:
              scope: control-plane-host
              namespace: vcluster-dns-test
              labelSelector:
                matchLabels:
                  vcluster.com/dns-ns: secondary
          - service:
              scope: tenant-cluster
              namespace: kube-system
              labelSelector:
                matchLabels:
                  k8s-app: vcluster-kube-dns
