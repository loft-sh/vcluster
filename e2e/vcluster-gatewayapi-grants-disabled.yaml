controlPlane:
  statefulSet:
    image:
      registry: ""
      repository: {{ .Repository }}
      tag: {{ .Tag }}
sync:
  fromHost:
    gatewayClasses:
      enabled: true
      selector:
        matchLabels:
          e2e.vcluster.loft.sh/gatewayclass: gatewayapi-grants-disabled-vcluster
  toHost:
    services:
      enabled: true
    gatewayApi:
      gateways:
        enabled: true
      httpRoutes:
        enabled: true
      referenceGrants:
        enabled: false
