sync:
  fromHost:
    gatewayClasses:
      enabled: true
    gateways:
      enabled: true
      mappings:
        byName:
          "host-ns/edge": "tenant-ns/*"
  toHost:
    gatewayApi:
      gateways:
        enabled: false
      httpRoutes:
        enabled: true
      referenceGrants:
        enabled: auto
