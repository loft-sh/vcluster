sync:
  fromHost:
    gatewayClasses:
      enabled: true
    gateways:
      enabled: true
      mappings:
        byName:
          "host-ns/*": "tenant-ns/edge"
  toHost:
    gatewayApi:
      gateways:
        enabled: false
      httpRoutes:
        enabled: true
      referenceGrants:
        enabled: auto
